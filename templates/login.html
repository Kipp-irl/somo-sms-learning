<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somo — Instructor Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="login-layout">
        <div class="card login-card">
            <div class="card-body">
                <div class="login-header">
                    <h1>Somo</h1>
                    <p>Instructor Portal</p>
                </div>
                <div class="form-group">
                    <label class="form-label">Name</label>
                    <input type="text" id="name" class="form-input" placeholder="Your name" autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">Passcode</label>
                    <input type="password" id="passcode" class="form-input" placeholder="Enter passcode">
                </div>
                <button class="btn btn-primary" style="width:100%;margin-top:8px;" onclick="login()">Sign In</button>
                <div class="login-error" id="error-msg">Invalid credentials.</div>
            </div>
        </div>
    </div>
    <script>
        async function login() {
            const name = document.getElementById('name').value.trim();
            const passcode = document.getElementById('passcode').value.trim();
            if (!name || !passcode) return;
            const r = await fetch('/instructor/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, passcode }),
            });
            const data = await r.json();
            if (r.ok) {
                sessionStorage.setItem('inst_id', data.instructor_id);
                sessionStorage.setItem('inst_name', data.name);
                window.location.href = '/instructor';
            } else {
                const err = document.getElementById('error-msg');
                err.textContent = data.error || 'Login failed.';
                err.style.display = 'block';
            }
        }
        document.getElementById('passcode').addEventListener('keyup', e => { if (e.key === 'Enter') login(); });
    </script>
</body>

</html>
